<svg width="1200" height="1400" viewBox="0 0 1200 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="110" x2="1010" y2="1300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FBFE"/>
      <stop offset="1" stop-color="#D5E8F0"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(918 252) rotate(90) scale(280 280)">
      <stop stop-color="#5BC5DB" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#5BC5DB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 1120) rotate(90) scale(290 290)">
      <stop stop-color="#E1B55E" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#E1B55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="600" y1="128" x2="600" y2="1272" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFE"/>
      <stop offset="1" stop-color="#E5F0F6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="180" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3D8DBA"/>
      <stop offset="1" stop-color="#2C6D94"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="180" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2EA07E"/>
      <stop offset="1" stop-color="#1F6E55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1400" rx="52" fill="url(#bg)"/>
  <circle cx="918" cy="252" r="280" fill="url(#glowA)"/>
  <circle cx="240" cy="1120" r="290" fill="url(#glowB)"/>

  <rect x="310" y="100" width="560" height="1200" rx="80" fill="#091722"/>
  <rect x="338" y="128" width="504" height="1144" rx="56" fill="url(#screen)"/>
  <rect x="504" y="154" width="172" height="22" rx="11" fill="#0D2130"/>

  <text x="400" y="232" fill="#2B6D93" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="4">SYNCED VISIBILITY</text>
  <text x="400" y="284" fill="#10212D" font-family="Fraunces, Georgia, serif" font-size="50" font-weight="700">Field updates flow back fast</text>
  <text x="400" y="322" fill="#516474" font-family="Manrope, Arial, sans-serif" font-size="24">One mobile action can trigger notes, templates and reporting context</text>

  <rect x="382" y="360" width="416" height="166" rx="30" fill="white"/>
  <text x="410" y="410" fill="#10212D" font-family="Fraunces, Georgia, serif" font-size="40" font-weight="700">Activity saved</text>
  <text x="410" y="448" fill="#516474" font-family="Manrope, Arial, sans-serif" font-size="22">Promise logged and supervisor queue updated</text>
  <rect x="410" y="470" width="146" height="30" rx="15" fill="#D7ECF5"/>
  <text x="448" y="491" fill="#2B6D93" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800">Visit complete</text>
  <rect x="572" y="470" width="176" height="30" rx="15" fill="#E9F1D2"/>
  <text x="611" y="491" fill="#5A6D2F" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800">Template queued</text>

  <rect x="382" y="552" width="198" height="140" rx="28" fill="url(#blue)"/>
  <text x="418" y="602" fill="white" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="2">AGENT NOTE</text>
  <text x="418" y="648" fill="white" font-family="Fraunces, Georgia, serif" font-size="34" font-weight="700">Captured now</text>
  <text x="418" y="678" fill="white" font-family="Manrope, Arial, sans-serif" font-size="20">No second pass later</text>

  <rect x="600" y="552" width="198" height="140" rx="28" fill="url(#teal)"/>
  <text x="636" y="602" fill="white" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="2">REPORTING</text>
  <text x="636" y="648" fill="white" font-family="Fraunces, Georgia, serif" font-size="34" font-weight="700">Ready sooner</text>
  <text x="636" y="678" fill="white" font-family="Manrope, Arial, sans-serif" font-size="20">Clearer day-to-day oversight</text>

  <rect x="382" y="720" width="416" height="316" rx="30" fill="white"/>
  <text x="410" y="768" fill="#2B6D93" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="2">SUPERVISOR VIEW</text>
  <rect x="410" y="796" width="360" height="72" rx="22" fill="#EEF5F8"/>
  <text x="438" y="840" fill="#173245" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="700">Promise made - next reminder scheduled</text>
  <rect x="410" y="892" width="360" height="18" rx="9" fill="#D6E4EB"/>
  <rect x="410" y="926" width="332" height="18" rx="9" fill="#E0EBF1"/>
  <rect x="410" y="960" width="280" height="18" rx="9" fill="#D6E4EB"/>
  <rect x="410" y="996" width="138" height="16" rx="8" fill="#D7ECF5"/>
  <rect x="564" y="996" width="118" height="16" rx="8" fill="#E9F1D2"/>

  <rect x="382" y="1062" width="416" height="150" rx="30" fill="#0E2535"/>
  <text x="420" y="1120" fill="white" font-family="Fraunces, Georgia, serif" font-size="34" font-weight="700">Triggered actions</text>
  <text x="420" y="1160" fill="white" font-family="Manrope, Arial, sans-serif" font-size="22">Templates, notes and follow-up tasks move forward from the same save.</text>

  <g opacity="0.98">
    <rect x="102" y="262" width="178" height="156" rx="28" fill="white"/>
    <text x="136" y="312" fill="#2B6D93" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="2">OFFICE VIEW</text>
    <text x="136" y="358" fill="#10212D" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="700">Shared sooner</text>
    <text x="136" y="390" fill="#516474" font-family="Manrope, Arial, sans-serif" font-size="20">Fresh status without manual chase.</text>
  </g>

  <g opacity="0.98">
    <rect x="872" y="990" width="214" height="170" rx="30" fill="white"/>
    <text x="906" y="1040" fill="#2B6D93" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="2">NEXT STEP</text>
    <text x="906" y="1088" fill="#10212D" font-family="Fraunces, Georgia, serif" font-size="34" font-weight="700">Already queued</text>
    <text x="906" y="1128" fill="#516474" font-family="Manrope, Arial, sans-serif" font-size="21">Supervisors can act on it immediately.</text>
  </g>
</svg>
